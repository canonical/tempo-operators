name: Release Charm to Edge and Publish Libraries

on:
  # Manual trigger
  workflow_dispatch: {}
  push:
    branches:
      - main
      - track/**

permissions:
  # Required for all workflows
  security-events: write
  # Only required for workflows in private repositories
  actions: read
  # Write permission needed for the reusable workflow to push git tags
  contents: write

jobs:
  charms-changed:
    runs-on: ubuntu-latest
    outputs:
      coordinator_changed: ${{ steps.coordinator-changed-files.outputs.any_modified }}
      worker_changed: ${{ steps.worker-changed-files.outputs.any_modified }}
    steps:
      - name: Checkout repository
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Determine changed files in the coordinator
        if: github.event_name != 'workflow_dispatch'
        id: coordinator-changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: coordinator/**
          files_ignore: |
            README.md
            CONTRIBUTING.md
            INTEGRATING.md
            CODEOWNERS
            LICENSE
            icon.svg
            .gitignore
            .github/**
      - name: Determine changed files in the worker
        if: github.event_name != 'workflow_dispatch'
        id: worker-changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: worker/**
          files_ignore: |
            README.md
            CONTRIBUTING.md
            INTEGRATING.md
            CODEOWNERS
            LICENSE
            icon.svg
            .gitignore
            .github/**
  release-worker:
    needs: charms-changed
    if: github.event_name == 'workflow_dispatch' || needs.charms-changed.outputs.worker_changed == 'true'
    uses: canonical/observability/.github/workflows/charm-release.yaml@v2
    secrets: inherit
    with:
      default-track: dev
      charm-path: worker
      git-tag-prefix: worker-
      enable-integration: false
      terraform-tag-prefix: tf-worker-
  release-coordinator:
    needs: charms-changed
    if: github.event_name == 'workflow_dispatch' || needs.charms-changed.outputs.coordinator_changed == 'true'
    uses: canonical/observability/.github/workflows/charm-release.yaml@v2
    secrets: inherit
    with:
      default-track: dev
      charm-path: coordinator
      git-tag-prefix: coordinator-
      terraform-tag-prefix: tf-coordinator-
  release-terraform:
    needs:
      - release-worker
      - release-coordinator
    if: always() && (needs.release-worker.result == 'success' || needs.release-coordinator.result == 'success')
    uses: canonical/observability/.github/workflows/terraform-release.yaml@v2
    secrets:
      OBSERVABILITY_NOCTUA_TOKEN: ${{ secrets.OBSERVABILITY_NOCTUA_TOKEN }}
    with:
      terraform-tag-prefix: tf-tempo-
